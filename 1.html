<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniReddit</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Верхняя панель -->
  <header>
    <div>MiniReddit</div>
    <input type="text" placeholder="Поиск...">
    <button>Войти</button>
  </header>

  <!-- Основной блок -->
  <main>

    <!-- Пост 1 -->
    <article>
      <div>
        <button>⬆️</button>
        <div>120</div>
        <button>⬇️</button>
      </div>

      <div>
        <h2>Первый пост</h2>
        <p>Это пример поста как на Reddit.</p>
        <small>u/user1 • 2 часа назад</small>
      </div>
    </article>

    <!-- Пост 2 -->
    <article>
      <div>
        <button>⬆️</button>
        <div>54</div>
        <button>⬇️</button>
      </div>

      <div>
        <h2>Второй пост</h2>
        <p>Здесь может быть любой текст.</p>
        <small>u/user2 • 5 часов назад</small>
      </div>
    </article>

  </main>

  <!-- Боковая панель -->
  <aside>
    <h3>Темы</h3>
    <ul>
      <li>Популярное</li>
      <li>Игры</li>
      <li>Программирование</li>
      <li>Дизайн</li>
    </ul>
  </aside>

</body>
</html>
